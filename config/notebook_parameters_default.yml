all_notebooks:
  # These parameters will be applied to all notebooks.
  # If one of these parameters also appears in the corresponding
  # notebook section, it can be specified there on a per-notebook basis.
  run_name: alfonso-baseline                  # used as output directory name: outputs/{run_name}/
  plate_model:
    use_provided_plate_model: True
    plate_model_name: alfonso2024_default    # used to source plate model files via PMM & name file hierarchy
  timespan:
    min: 0
    max: 170
  reference_feature: trenches         # geometry used to define study area and unlabelled sampling
  study_zone_buffer: 6.0 # degrees    # radius around reference_feature for unlabelled point generation
  regions_filename: "regions.geojson" # optional regions file, saved in data/
  use_mantle_features: False          # if true, 01 reads training_data_global_with_mantle.csv
  gadopt_run_name:                    # e.g. v1_pre_craton_fix; required when use_mantle_features: true

  use_extracted_data: True
  data_dir: data
  output_dir: output

  n_jobs: 8
  verbose: True
  random_seed: 1234
  overwrite_output: False


